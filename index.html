<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>班級閱讀紀錄</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: 'Helvetica Neue', Helvetica, Arial, '微軟正黑體', sans-serif; background-color: #f0f8ff; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; box-sizing: border-box; }
    .container { background-color: #ffffff; padding: 30px 40px; border-radius: 15px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
    h2 { color: #357abd; text-align: center; margin-bottom: 25px; font-size: 24px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-weight: bold; color: #444; font-size: 15px; }
    select, input[type="text"], input[type="number"] { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    select:focus, input:focus { outline: none; border-color: #357abd; }
    input[readonly] { background-color: #f5f5f5; color: #666; cursor: not-allowed; }
    
    button { background-color: #4a90e2; color: white; border: none; padding: 14px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; transition: background-color 0.3s; }
    button:hover { background-color: #357abd; }
    button:disabled { background-color: #ccc; cursor: not-allowed; }
    
    #message { margin-top: 15px; text-align: center; color: #28a745; font-weight: bold; }
    #lastPageInfo { color: #e67e22; font-size: 14px; margin-top: 6px; font-weight: bold; min-height: 20px; }
    
    #successScreen { display: none; text-align: center; }
    .summary-box { background-color: #f8f9fa; border: 2px dashed #357abd; border-radius: 8px; padding: 25px 20px; margin-top: 15px; text-align: left; font-size: 18px; line-height: 2; color: #333; }
    .btn-secondary { background-color: #6c757d; margin-top: 25px; }
    .btn-secondary:hover { background-color: #5a6268; }

    .btn-certify { display: block; background-color: #f59e0b; color: white; text-decoration: none; padding: 14px 20px; border-radius: 8px; font-size: 18px; font-weight: bold; text-align: center; margin-top: 15px; transition: background-color 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    .btn-certify:hover { background-color: #d97706; }
    .cert-passed { color: #059669; font-weight: bold; }
  </style>
</head>
<body>

  <div class="container">
    <h2>📚 班級閱讀紀錄</h2>
    
    <form id="recordForm" onsubmit="handleFormSubmit(this); return false;">
      <div class="form-group">
        <label for="classNum">1. 你的班級？</label>
        <select id="classNum" name="classNum" required onchange="updateNumbers(); checkLastPage();">
          <option value="">載入中...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="studentNum">2. 你的座號？</label>
        <select id="studentNum" name="studentNum" required onchange="updateName(); checkLastPage();">
          <option value="">請先選擇班級</option>
        </select>
      </div>

      <div class="form-group">
        <label for="studentName">3. 你的姓名？</label>
        <input type="text" id="studentName" name="studentName" readonly required placeholder="選擇座號後自動顯示">
      </div>

      <div class="form-group">
        <label for="book">4. 今天讀了哪一本書？</label>
        <select id="book" name="book" required onchange="checkLastPage()">
          <option value="">載入中...</option>
        </select>
        <div id="lastPageInfo"></div>
        
        <div id="certifyDiv1" style="display: none;">
          <a href="https://read.tc.edu.tw/index_2020.php" target="_blank" class="btn-certify">🏆 已經看完囉！點我前往認證</a>
        </div>
      </div>

      <div class="form-group">
        <label for="pages">5. 這次看到了第幾頁？</label>
        <input type="number" id="pages" name="pages" min="1" placeholder="請輸入數字" required>
      </div>

      <button type="submit" id="submitBtn">送出紀錄</button>
      <div id="message"></div>
    </form>

    <div id="successScreen">
      <h3 style="color: #28a745; font-size: 26px; margin-top: 0;">🎉 紀錄成功！</h3>
      <div class="summary-box" id="recordSummary"></div>
      
      <div id="certifyDiv2" style="display: none;">
        <p style="color: #d97706; font-weight: bold; margin-bottom: 5px;">恭喜你讀完這本書了！</p>
        <a href="https://read.tc.edu.tw/index_2020.php" target="_blank" class="btn-certify">🏆 點擊前往認證系統</a>
      </div>

      <button class="btn-secondary" onclick="location.reload()">下一位同學登記</button>
    </div>

  </div>

  <script>
    // ★★★ 記得把這行換成你的 GAS 網址 ★★★
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbznitsooVaLOWnajPU3hqyGLcZj1GpBAi5TmyvEUmiS2XQmp8yYaXfAETkA8k_MFFog/exec'; 
    
    var allStudents = [];
    var bookDetails = {}; 

    document.addEventListener('DOMContentLoaded', function() {
      fetch(GAS_URL + '?action=getDropdown')
        .then(response => response.json())
        .then(data => populateData(data))
        .catch(error => console.error('Error:', error));
    });

    function populateData(data) {
      allStudents = data.students;
      bookDetails = data.bookDetails || {}; 
      
      var classSelect = document.getElementById('classNum');
      var bookSelect = document.getElementById('book');
      
      var classes = [];
      allStudents.forEach(function(s) {
        if (classes.indexOf(s[0]) === -1) classes.push(s[0]);
      });
      
      classSelect.innerHTML = '<option value="">請選擇班級...</option>';
      classes.forEach(function(c) {
        var option = document.createElement('option');
        option.value = c; option.text = c;
        classSelect.appendChild(option);
      });
      
      bookSelect.innerHTML = '<option value="">請選擇書籍...</option>';
      data.books.forEach(function(b) {
        var option = document.createElement('option');
        option.value = b; option.text = b;
        bookSelect.appendChild(option);
      });
    }

    function updateNumbers() {
      var selectedClass = document.getElementById('classNum').value;
      var numSelect = document.getElementById('studentNum');
      var nameInput = document.getElementById('studentName');
      
      numSelect.innerHTML = '<option value="">請選擇座號...</option>';
      nameInput.value = '';
      
      if (!selectedClass) return;

      var filteredStudents = allStudents.filter(function(s) { return s[0] == selectedClass; });
      filteredStudents.sort(function(a, b) { return a[1] - b[1]; });

      filteredStudents.forEach(function(s) {
        var option = document.createElement('option');
        option.value = s[1]; option.text = s[1];
        numSelect.appendChild(option);
      });
    }

    function updateName() {
      var selectedClass = document.getElementById('classNum').value;
      var selectedNum = document.getElementById('studentNum').value;
      var nameInput = document.getElementById('studentName');
      
      var student = allStudents.find(function(s) { 
        return s[0] == selectedClass && s[1] == selectedNum; 
      });
      
      nameInput.value = student ? student[2] : '';
    }

    function checkLastPage() {
      var classNum = document.getElementById('classNum').value;
      var studentNum = document.getElementById('studentNum').value;
      var book = document.getElementById('book').value;
      
      var infoDiv = document.getElementById('lastPageInfo');
      var certifyDiv1 = document.getElementById('certifyDiv1');
      certifyDiv1.style.display = 'none'; 
      
      if (!classNum || !studentNum || !book) {
        infoDiv.innerText = '';
        return;
      }

      infoDiv.innerText = '🔍 尋找上次進度中...';

      var url = GAS_URL + '?action=getLastPage' + 
                '&classNum=' + encodeURIComponent(classNum) + 
                '&studentNum=' + encodeURIComponent(studentNum) + 
                '&book=' + encodeURIComponent(book);

      fetch(url)
        .then(response => response.json())
        .then(data => {
          if (data.lastPage === "尚無紀錄") {
            infoDiv.innerText = '💡 這是你第一次讀這本書喔！';
          } else {
            // 👉 新增判斷邏輯：如果是已經認證過的狀態，就不會跳出按鈕
            if (data.isCertified) {
              infoDiv.innerHTML = '📌 上次讀到第 ' + data.lastPage + ' 頁 <br><span class="cert-passed">🟢 已通過教師認證，太棒了！</span>';
            } else {
              infoDiv.innerText = '📌 上次讀到第 ' + data.lastPage + ' 頁';
              var totalPages = bookDetails[book] || 99999;
              if (parseInt(data.lastPage, 10) >= totalPages) {
                infoDiv.innerText += ' (🎉 已讀完，等待認證)';
                certifyDiv1.style.display = 'block'; 
              }
            }
          }
        })
        .catch(error => {
          infoDiv.innerText = '';
          console.error('Error:', error);
        });
    }

    function handleFormSubmit(formObject) {
      var btn = document.getElementById('submitBtn');
      var msgBox = document.getElementById('message');
      
      btn.disabled = true;
      btn.innerText = '資料傳送中...';
      msgBox.innerText = '';
      
      var classNum = document.getElementById('classNum').value;
      var studentNum = document.getElementById('studentNum').value;
      var studentName = document.getElementById('studentName').value;
      var book = document.getElementById('book').value;
      var pages = document.getElementById('pages').value;

      var url = GAS_URL + '?action=submitRecord' + 
                '&classNum=' + encodeURIComponent(classNum) + 
                '&studentNum=' + encodeURIComponent(studentNum) + 
                '&studentName=' + encodeURIComponent(studentName) + 
                '&book=' + encodeURIComponent(book) + 
                '&pages=' + encodeURIComponent(pages);

      fetch(url)
        .then(response => response.json())
        .then(data => {
          document.getElementById('recordForm').style.display = 'none';
          document.getElementById('successScreen').style.display = 'block';
          
          document.getElementById('recordSummary').innerHTML = 
            '🏷️ <b>班級：</b>' + classNum + '<br>' +
            '👤 <b>座號：</b>' + studentNum + ' 號<br>' +
            '📛 <b>姓名：</b>' + studentName + '<br>' +
            '📖 <b>書籍：</b>' + book + '<br>' +
            '🔖 <b>目前進度：</b>第 ' + pages + ' 頁';
            
          var totalPages = bookDetails[book] || 99999;
          var certifyDiv2 = document.getElementById('certifyDiv2');
          if (parseInt(pages, 10) >= totalPages) {
            certifyDiv2.style.display = 'block';
          }
        })
        .catch(error => {
          msgBox.innerText = '連線失敗，請檢查網路或稍後再試';
          btn.disabled = false;
          btn.innerText = '重新送出';
          console.error('Error:', error);
        });
    }
  </script>
</body>
</html>
