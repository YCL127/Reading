<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <base target="_top">
  <style>
    /* 這裡負責網頁美化 */
    body {
      font-family: 'Helvetica Neue', Helvetica, Arial, '微軟正黑體', sans-serif;
      background-color: #f0f8ff; /* 柔和的淺藍色背景 */
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      padding: 20px;
      box-sizing: border-box;
    }
    .container {
      background-color: #ffffff;
      padding: 30px 40px;
      border-radius: 15px; /* 圓角設計 */
      box-shadow: 0 8px 16px rgba(0,0,0,0.1); /* 增加立體陰影 */
      width: 100%;
      max-width: 450px;
    }
    h2 {
      color: #357abd;
      text-align: center;
      margin-bottom: 25px;
      font-size: 24px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      margin-bottom: 8px;
      font-weight: bold;
      color: #444;
      font-size: 16px;
    }
    select, input[type="number"] {
      width: 100%;
      padding: 12px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 16px;
      box-sizing: border-box;
      transition: border-color 0.3s;
    }
    select:focus, input[type="number"]:focus {
      outline: none;
      border-color: #357abd; /* 點擊時外框變藍色 */
    }
    button {
      background-color: #4a90e2;
      color: white;
      border: none;
      padding: 14px 20px;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      margin-top: 10px;
      transition: background-color 0.3s, transform 0.1s;
    }
    button:hover {
      background-color: #357abd;
    }
    button:active {
      transform: scale(0.98); /* 按下時會有回饋感 */
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #message {
      margin-top: 20px;
      text-align: center;
      color: #28a745;
      font-weight: bold;
      font-size: 16px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h2>📚 班級閱讀紀錄小幫手</h2>
    
    <form id="recordForm" onsubmit="handleFormSubmit(this); return false;">
      
      <div class="form-group">
        <label for="student">1. 你是哪一位同學呢？</label>
        <select id="student" name="student" required>
          <option value="">載入資料中，請稍候...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="book">2. 今天讀了哪一本書？</label>
        <select id="book" name="book" required>
          <option value="">載入資料中，請稍候...</option>
        </select>
      </div>

      <div class="form-group">
        <label for="pages">3. 這次看了幾頁？</label>
        <input type="number" id="pages" name="pages" min="1" placeholder="請輸入數字，例如：10" required>
      </div>

      <button type="submit" id="submitBtn">送出紀錄</button>
      <div id="message"></div>
      
    </form>
  </div>

  <script>
    // 網頁一打開，就去跟 GAS 要下拉選單的資料
    document.addEventListener('DOMContentLoaded', function() {
      google.script.run.withSuccessHandler(populateDropdowns).getDropdownData();
    });

    // 將要到的資料填入選單
    function populateDropdowns(data) {
      var studentSelect = document.getElementById('student');
      var bookSelect = document.getElementById('book');
      
      studentSelect.innerHTML = '<option value="">請選擇座號姓名...</option>';
      bookSelect.innerHTML = '<option value="">請選擇書籍...</option>';
      
      data.students.forEach(function(student) {
        var option = document.createElement('option');
        option.value = student;
        option.text = student;
        studentSelect.appendChild(option);
      });
      
      data.books.forEach(function(book) {
        var option = document.createElement('option');
        option.value = book;
        option.text = book;
        bookSelect.appendChild(option);
      });
    }

    // 按下送出按鈕後的動作
    function handleFormSubmit(formObject) {
      var btn = document.getElementById('submitBtn');
      var msgBox = document.getElementById('message');
      
      btn.disabled = true;
      btn.innerText = '資料傳送中...';
      msgBox.innerText = '';
      
      var student = document.getElementById('student').value;
      var book = document.getElementById('book').value;
      var pages = document.getElementById('pages').value;

      // 把資料傳給後端 GAS 寫入試算表
      google.script.run.withSuccessHandler(function(msg) {
        msgBox.innerText = msg;
        btn.disabled = false;
        btn.innerText = '送出紀錄';
        formObject.reset(); // 清空空格讓下一個同學填
      }).submitRecord(student, book, pages);
    }
  </script>
</body>
</html>
